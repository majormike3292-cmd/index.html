<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>No matter what… it’s you 🤍</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      overflow-x: hidden;
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    img {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      margin-top: 20px;
      box-shadow: 0 0 25px rgba(255,255,255,0.6);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 44px;
      margin: 10px 0;
    }

    .letter {
      font-family: 'Great Vibes', cursive;
      font-size: 24px;
      max-width: 420px;
      margin: 25px auto;
      min-height: 180px;
      line-height: 1.7;
    }

    button {
      margin: 10px;
      padding: 12px 22px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff6b81;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      z-index: 10;
    }

    .fullscreen p {
      font-size: 26px;
      font-family: 'Great Vibes', cursive;
    }

    .petal {
      position: fixed;
      top: -10px;
      pointer-events: none;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.6;
      }
    }

    .wish-box {
      margin-top: 20px;
    }

    input {
      padding: 12px;
      border-radius: 20px;
      border: none;
      width: 70%;
      outline: none;
    }

    .wish-float {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 20px;
      font-family: 'Great Vibes', cursive;
      font-size: 22px;
      animation: floatWish 5s ease forwards;
    }

    @keyframes floatWish {
      0% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -300px); }
    }

    .music-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.2);
      padding: 8px;
      backdrop-filter: blur(10px);
    }

    audio {
      width: 100%;
    }

    #intro {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#000;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Great Vibes', cursive;
      font-size:28px;
      z-index:20;
      text-align:center;
      padding:20px;
    }
  </style>
</head>

<body>

<!-- 🌸 Intro Screen -->
<div id="intro">
  Open this when you're alone… 🌸
</div>

<div class="container">

  <!-- 🔁 PUT YOUR IMAGE LINK HERE -->
  <img src="your-photo.jpg" alt="Us" />

  <h1>For You 🌹</h1>

  <div class="letter" id="letter"></div>

  <button onclick="showHug()">Press here for a hug 🫂</button>

  <div class="wish-box">
    <input id="wishInput" placeholder="Make a wish or prayer..." />
    <button onclick="releaseWish()">Release 🌸</button>
  </div>
</div>

<!-- 🫂 Hug Screen -->
<div class="fullscreen" id="hugScreen" onclick="hideHug()">
  <p>
    If you ever feel alone... this is me holding you tight 🤍<br><br>
    No pressure. No expectations. Just love.
  </p>
</div>

<!-- 🎵 AUTOPLAY MUSIC -->
<div class="music-bar">
  <audio id="bg-music" autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=love-ambient-11023.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  // ✍️ Typing letter
  const text = `I know you say we aren't equally yoked...

But I love you to death.

If I can't have you as my spouse...
would you still be my friend?

Because you're the only person I talk to... besides God.

And no matter what happens...
I just want you in my life somehow.`;

  let i = 0;
  function typeWriter() {
    if (i < text.length) {
      document.getElementById("letter").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 55);
    }
  }
  typeWriter();

  // 🫂 Hug
  function showHug() {
    document.getElementById('hugScreen').style.display = 'flex';
  }

  function hideHug() {
    document.getElementById('hugScreen').style.display = 'none';
  }

  // 🌸 Petals
  function createPetal() {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    petal.innerHTML = '🌸';
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.fontSize = (Math.random() * 10 + 15) + 'px';
    petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 7000);
  }
  setInterval(createPetal, 250);

  // 🌸 Wish
  function releaseWish() {
    const wishText = document.getElementById('wishInput').value;
    if (!wishText) return;

    const wish = document.createElement('div');
    wish.classList.add('wish-float');
    wish.innerText = wishText + ' 🌸';
    document.body.appendChild(wish);

    setTimeout(() => wish.remove(), 5000);
    document.getElementById('wishInput').value = '';
  }

  // 🎵 Fade in audio
  const audio = document.getElementById('bg-music');
  audio.volume = 0;

  document.body.addEventListener('click', () => {
    audio.play();
    let vol = 0;
    const fade = setInterval(() => {
      if (vol < 1) {
        vol += 0.05;
        audio.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  });

  // 🌸 Intro fade out
  setTimeout(() => {
    const intro = document.getElementById('intro');
    intro.style.transition = 'opacity 2s';
    intro.style.opacity = '0';
    setTimeout(() => intro.remove(), 2000);
  }, 2500);

</script>

</body>
</html>
